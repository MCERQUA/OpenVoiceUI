# =============================================================================
# keep-alive-system configuration
#
# Edit these values to match your deployment.
# All scripts source this file — it is the single source of truth.
# =============================================================================

# --- Paths -------------------------------------------------------------------
# Set PROJECT_ROOT to the directory that contains compose/ and openclaw/
PROJECT_ROOT="/mnt/clients/YOUR_INSTANCE"
COMPOSE_DIR="${PROJECT_ROOT}/compose"
COMPOSE_FILE="${COMPOSE_DIR}/docker-compose.yml"
WORKSPACE_DIR="${PROJECT_ROOT}/openclaw/workspace"
LOG_DIR="${PROJECT_ROOT}/openclaw/keep-alive-system/logs"
SCRIPT_DIR="${PROJECT_ROOT}/openclaw/keep-alive-system"

# --- Container names ---------------------------------------------------------
# Must match the container_name values in your docker-compose.yml
OPENCLAW_CONTAINER="openclaw-YOUR_INSTANCE"
OPENVOICEUI_CONTAINER="openvoiceui-YOUR_INSTANCE"
COMPOSE_SERVICE_OPENCLAW="openclaw"
COMPOSE_SERVICE_OPENVOICEUI="openvoiceui"

# --- Monitoring intervals ----------------------------------------------------
# Main loop sleep between checks (seconds)
CHECK_INTERVAL=60

# How many consecutive failures before escalating to next tier
TIER1_THRESHOLD=1        # First failure -> run doctor --repair
TIER2_THRESHOLD=3        # 3 consecutive failures -> restart container
TIER3_THRESHOLD=5        # 5 consecutive failures -> full recreate
TIER4_THRESHOLD=8        # 8 consecutive failures -> enter cooldown

# Cooldown: stop retrying for this many seconds after hitting tier 4
COOLDOWN_SECONDS=600     # 10 minutes

# --- Health check tuning -----------------------------------------------------
# Timeout for docker exec health commands (seconds)
HEALTH_EXEC_TIMEOUT=15

# OpenVoiceUI HTTP health check URL (from host perspective -- port is mapped)
OPENVOICEUI_HEALTH_URL="http://127.0.0.1:5001/health/ready"
OPENVOICEUI_HTTP_TIMEOUT=10

# --- Workspace backup --------------------------------------------------------
BACKUP_ENABLED=true

# Maximum number of daily backup commits to keep
BACKUP_MAX_COMMITS=90

# Trigger backup at this hour (0-23, local time)
BACKUP_HOUR=3

# --- Notifications -----------------------------------------------------------
# Send alerts through the OpenClaw gateway to the agent session
NOTIFY_ENABLED=true

# Notification cooldown: don't repeat the same alert within this many seconds
NOTIFY_COOLDOWN=300

# --- Logging -----------------------------------------------------------------
# Max log file size in bytes before rotation (5MB)
LOG_MAX_BYTES=5242880

# Number of rotated logs to keep
LOG_KEEP_COUNT=5
