<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');

:root {
  --bg:#08090e;
  --s0:rgba(255,255,255,0.025);--s1:rgba(255,255,255,0.04);--s2:rgba(255,255,255,0.06);--s3:rgba(255,255,255,0.09);--sh:rgba(255,255,255,0.12);
  --b0:rgba(255,255,255,0.06);--b1:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.14);
  --t1:#f0f2f5;--t2:#8b92a5;--t3:#505872;--t4:#333b50;
  --blue:#3b82f6;--blue-s:rgba(59,130,246,0.10);--blue-b:rgba(59,130,246,0.20);
  --red:#f43f5e;--red-s:rgba(244,63,94,0.10);--red-b:rgba(244,63,94,0.20);
  --green:#10b981;--green-s:rgba(16,185,129,0.10);--green-b:rgba(16,185,129,0.20);
  --amber:#f59e0b;--amber-s:rgba(245,158,11,0.10);--amber-b:rgba(245,158,11,0.20);
  --cyan:#22d3ee;--cyan-s:rgba(34,211,238,0.10);--cyan-b:rgba(34,211,238,0.20);
  --r:14px;--rs:10px;--rxs:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px 128px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b0);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--b1)}

/* Ambient orbs */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px)}

/* Nav */
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);background:rgba(8,9,14,0.65);border-bottom:1px solid var(--b0);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
.nav-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#1e3a5f,#3b82f6);display:grid;place-items:center;flex-shrink:0;box-shadow:0 0 24px rgba(59,130,246,0.15),inset 0 1px 0 rgba(255,255,255,0.15)}
.nav-title{font-size:14px;font-weight:700;letter-spacing:-0.3px}
.nav-sep{width:1px;height:16px;background:var(--b0)}
.nav-sub{font-size:12px;font-weight:500;color:var(--t3)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{font-size:10px;font-weight:700;letter-spacing:0.04em;padding:3px 10px;border-radius:6px;display:flex;align-items:center;gap:5px}
.pill-live{background:var(--green-s);color:var(--green);border:1px solid var(--green-b)}
.pill-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.nav-btn{background:none;border:1px solid var(--b0);color:var(--t3);border-radius:var(--rxs);padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 160ms}
.nav-btn:hover{border-color:var(--blue-b);color:var(--blue);background:var(--blue-s)}

/* Layout */
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px 20px 40px}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--s0);border:1px solid var(--b0);border-radius:var(--rs);padding:14px 16px;position:relative;overflow:hidden;transition:border-color 200ms}
.kpi:hover{border-color:var(--b2)}
.kpi::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;opacity:0;transition:opacity 200ms}
.kpi:hover::before{opacity:1}
.kpi-blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent)}
.kpi-green::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.kpi-amber::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.kpi-red::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.kpi-cyan::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.kpi-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;min-height:400px}
@media(max-width:1100px){.kanban{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kanban{grid-template-columns:1fr}}

.col{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r);display:flex;flex-direction:column;min-height:200px;overflow:hidden}
.col-head{padding:12px 14px;border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-name{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.col-count{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--s2)}
.col-value{font-size:10px;font-weight:600;color:var(--t3);padding:4px 14px;border-bottom:1px solid var(--b0)}
.col-body{padding:8px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.col-empty{padding:20px;text-align:center;font-size:12px;color:var(--t4);font-style:italic}

/* Deal cards */
.deal{background:var(--s1);border:1px solid var(--b0);border-radius:var(--rs);padding:10px 12px;cursor:pointer;transition:all 160ms}
.deal:hover{border-color:var(--b2);background:var(--s2);transform:translateY(-1px)}
.deal-name{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.deal-company{font-size:11px;color:var(--t2);margin-bottom:6px}
.deal-meta{display:flex;align-items:center;justify-content:space-between;gap:6px}
.deal-amount{font-size:12px;font-weight:700;color:var(--green)}
.deal-amount.zero{color:var(--t4)}
.deal-days{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.deal-days.fresh{background:var(--green-s);color:var(--green);border:1px solid var(--green-b)}
.deal-days.aging{background:var(--amber-s);color:var(--amber);border:1px solid var(--amber-b)}
.deal-days.stale{background:var(--red-s);color:var(--red);border:1px solid var(--red-b)}

/* Task bar */
.tasks-section{margin-top:18px}
.sec-title{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.task-card{background:var(--s0);border:1px solid var(--b0);border-radius:var(--rs);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;transition:border-color 160ms}
.task-card:hover{border-color:var(--b2)}
.task-check{width:16px;height:16px;border:2px solid var(--b1);border-radius:4px;flex-shrink:0;margin-top:1px}
.task-info{flex:1;min-width:0}
.task-title{font-size:12px;font-weight:600;line-height:1.3}
.task-due{font-size:10px;color:var(--t3);margin-top:2px}
.task-due.overdue{color:var(--red)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--t3);font-size:14px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--b1);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-msg{background:var(--red-s);border:1px solid var(--red-b);border-radius:var(--rs);padding:16px 20px;color:var(--red);font-size:13px;text-align:center;margin:20px 0}
</style>
</head>
<body>

<div class="ambient">
  <div class="orb" style="width:400px;height:400px;background:rgba(59,130,246,0.04);top:-100px;right:-50px"></div>
  <div class="orb" style="width:300px;height:300px;background:rgba(16,185,129,0.03);bottom:-80px;left:-40px"></div>
</div>

<nav>
  <div class="nav-mark">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg>
  </div>
  <span class="nav-title">Pipeline</span>
  <div class="nav-sep"></div>
  <span class="nav-sub" id="navTenant">Loading...</span>
  <div class="nav-r">
    <div class="pill pill-live" id="statusPill">LIVE</div>
    <button class="nav-btn" onclick="loadData()">Refresh</button>
    <button class="nav-btn" onclick="openCRM()">Open CRM</button>
  </div>
</nav>

<div class="wrap">
  <div id="content">
    <div class="loading"><div class="spinner"></div> Loading pipeline data...</div>
  </div>
</div>

<script>
const tenant = window.location.hostname.split('.')[0];
document.getElementById('navTenant').textContent = tenant;

// Colors assigned by stage name pattern — handles any stage Twenty uses
const STAGE_COLORS = {
  NEW: { dot: '#3b82f6', bg: 'var(--blue-s)' },
  INCOMING: { dot: '#3b82f6', bg: 'var(--blue-s)' },
  MEETING: { dot: '#22d3ee', bg: 'var(--cyan-s)' },
  SCREENING: { dot: '#22d3ee', bg: 'var(--cyan-s)' },
  PROPOSAL: { dot: '#f59e0b', bg: 'var(--amber-s)' },
  NEGOTIATION: { dot: '#f59e0b', bg: 'var(--amber-s)' },
  CLOSED_WON: { dot: '#10b981', bg: 'var(--green-s)' },
  WON: { dot: '#10b981', bg: 'var(--green-s)' },
  CLOSED_LOST: { dot: '#f43f5e', bg: 'var(--red-s)' },
  LOST: { dot: '#f43f5e', bg: 'var(--red-s)' },
};
const DEFAULT_COLOR = { dot: '#8b92a5', bg: 'var(--s2)' };
function stageColor(s) { return STAGE_COLORS[s] || DEFAULT_COLOR; }

function fmt(n) {
  if (!n) return '$0';
  // Handle Twenty's {amountMicros, currencyCode} format
  if (typeof n === 'object' && n.amountMicros) n = n.amountMicros / 1000000;
  return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function dealAmount(deal) {
  // Use pre-computed _dollars from bridge, or extract from amount object
  if (deal._dollars) return deal._dollars;
  const a = deal.amount;
  if (!a) return 0;
  if (typeof a === 'number') return a;
  if (typeof a === 'object' && a.amountMicros) return a.amountMicros / 1000000;
  return 0;
}

function daysClass(d) {
  if (d <= 3) return 'fresh';
  if (d <= 7) return 'aging';
  return 'stale';
}

function renderKPIs(s) {
  return `<div class="kpi-row">
    <div class="kpi kpi-blue">
      <div class="kpi-label">Active Deals</div>
      <div class="kpi-val">${s.activeDeals}</div>
      <div class="kpi-sub">${s.totalDeals} total</div>
    </div>
    <div class="kpi kpi-green">
      <div class="kpi-label">Pipeline Value</div>
      <div class="kpi-val">${fmt(s.totalPipelineValue)}</div>
      <div class="kpi-sub">${fmt(s.wonValue)} won</div>
    </div>
    <div class="kpi kpi-amber">
      <div class="kpi-label">Stale Deals</div>
      <div class="kpi-val">${s.staleDeals}</div>
      <div class="kpi-sub">&gt;7 days same stage</div>
    </div>
    <div class="kpi kpi-cyan">
      <div class="kpi-label">Conversion</div>
      <div class="kpi-val">${s.conversionRate}%</div>
      <div class="kpi-sub">won / total</div>
    </div>
    <div class="kpi kpi-blue">
      <div class="kpi-label">Contacts</div>
      <div class="kpi-val">${s.totalContacts}</div>
      <div class="kpi-sub">${s.totalCompanies} companies</div>
    </div>
    <div class="kpi kpi-red">
      <div class="kpi-label">Open Tasks</div>
      <div class="kpi-val">${s.openTasks}</div>
      <div class="kpi-sub">action items</div>
    </div>
  </div>`;
}

function renderDeal(deal) {
  const days = deal._daysInStage || 0;
  const dc = daysClass(days);
  const dollars = dealAmount(deal);
  const amt = dollars ? fmt(dollars) : '';
  const amtClass = dollars ? '' : ' zero';
  const companyName = deal.company?.name || '';

  return `<div class="deal" onclick="openDeal('${deal.id}')">
    <div class="deal-name">${esc(deal.name || 'Untitled')}</div>
    ${companyName ? `<div class="deal-company">${esc(companyName)}</div>` : ''}
    <div class="deal-meta">
      <span class="deal-amount${amtClass}">${amt || '$0'}</span>
      <span class="deal-days ${dc}">${days}d</span>
    </div>
  </div>`;
}

function renderKanban(stages) {
  // Sort stages: active first, then closed. Within each, alphabetical.
  const closedNames = ['CLOSED_WON','CLOSED_LOST','WON','LOST'];
  const stageNames = Object.keys(stages);
  const active = stageNames.filter(s => !closedNames.includes(s)).sort();
  const closed = stageNames.filter(s => closedNames.includes(s)).sort();
  const orderedStages = [...active, ...closed];

  let html = `<div class="kanban" style="grid-template-columns:repeat(${Math.min(orderedStages.length, 6)},1fr)">`;
  for (const stage of orderedStages) {
    const deals = stages[stage] || [];
    const val = deals.reduce((s, d) => s + dealAmount(d), 0);
    const sc = stageColor(stage);

    html += `<div class="col">
      <div class="col-head">
        <span class="col-name" style="color:${sc.dot}">${stage.replace('_', ' ')}</span>
        <span class="col-count" style="background:${sc.bg};color:${sc.dot}">${deals.length}</span>
      </div>
      <div class="col-value">${fmt(val)}</div>
      <div class="col-body">
        ${deals.length > 0
          ? deals.map(renderDeal).join('')
          : '<div class="col-empty">No deals</div>'
        }
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderTasks(tasks) {
  if (!tasks || tasks.length === 0) return '';
  const now = Date.now();

  let html = `<div class="tasks-section">
    <div class="sec-title">Open Tasks (${tasks.length})</div>
    <div class="task-grid">`;

  for (const t of tasks.slice(0, 12)) {
    const due = t.dueAt ? new Date(t.dueAt) : null;
    const overdue = due && due.getTime() < now;
    const dueStr = due ? due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';

    html += `<div class="task-card">
      <div class="task-check"></div>
      <div class="task-info">
        <div class="task-title">${esc(t.title)}</div>
        ${dueStr ? `<div class="task-due${overdue ? ' overdue' : ''}">Due ${dueStr}${overdue ? ' (overdue)' : ''}</div>` : ''}
      </div>
    </div>`;
  }

  html += '</div></div>';
  return html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function openDeal(id) {
  window.open(`https://${tenant}.crm.jam-bot.com/object/opportunity/${id}`, '_blank');
}

function openCRM() {
  window.open(`https://${tenant}.crm.jam-bot.com/objects/opportunities`, '_blank');
}

async function loadData() {
  const el = document.getElementById('content');
  try {
    const resp = await fetch(`/social-api/api/crm/pipeline?tenant=${tenant}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const data = await resp.json();

    let html = renderKPIs(data.summary);
    html += renderKanban(data.stages);
    html += renderTasks(data.openTasks);

    // Footer
    html += `<div style="text-align:center;margin-top:20px;font-size:10px;color:var(--t4)">
      Updated ${new Date(data.generatedAt).toLocaleString()} | Auto-refreshes every 60s
    </div>`;

    el.innerHTML = html;
    document.getElementById('statusPill').innerHTML = '<span></span>LIVE';
    document.getElementById('statusPill').className = 'pill pill-live';
  } catch (err) {
    el.innerHTML = `<div class="error-msg">Failed to load pipeline data: ${esc(err.message)}<br><br>
      <button class="nav-btn" onclick="loadData()" style="font-size:13px;padding:8px 20px">Retry</button></div>`;
    console.error('Pipeline load error:', err);
  }
}

// Initial load + auto-refresh
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
