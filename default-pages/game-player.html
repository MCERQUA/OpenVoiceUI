<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: #000;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            background: #0f172a;
            border-bottom: 1px solid #1e3a5f;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
        }
        .back-btn {
            background: #1f2937;
            border: 1px solid #374151;
            color: #9ca3af;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .back-btn:hover { background: #374151; color: #e2e8f0; }
        .game-title {
            font-size: 15px;
            font-weight: 700;
            color: #e2e8f0;
            flex: 1;
        }
        .game-meta { font-size: 11px; color: #6b7280; }
        .topbar-hints {
            font-size: 11px;
            color: #374151;
            white-space: nowrap;
        }
        .fullscreen-btn {
            background: #1e3a5f;
            border: 1px solid #2d5a8e;
            color: #60a5fa;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .fullscreen-btn:hover { background: #1d4ed8; border-color: #3b82f6; color: #fff; }

        /* ── Player area ── */
        .player-wrap {
            flex: 1;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #dos-player {
            width: 100%;
            height: 100%;
            display: none;
        }

        /* ── Loading / Error state ── */
        .emu-status {
            text-align: center;
            color: #6b7280;
            padding: 20px;
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .emu-status-icon { font-size: 40px; margin-bottom: 14px; }
        .emu-status-title { font-size: 16px; color: #9ca3af; margin-bottom: 8px; }
        .emu-status-sub { font-size: 13px; }
        .emu-error-title { font-size: 16px; color: #f87171; margin-bottom: 8px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #1f2937;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .launch-btn {
            margin-top: 18px;
            padding: 10px 24px;
            background: #1d4ed8;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .launch-btn:hover { background: #2563eb; }

        /* ── Fullscreen ── */
        .player-wrap:-webkit-full-screen { background: #000; }
        .player-wrap:-moz-full-screen { background: #000; }
        .player-wrap:fullscreen { background: #000; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <button class="back-btn" onclick="history.back()" title="Go back">← Back</button>
    <div style="flex:1;min-width:0;">
        <div class="game-title" id="game-title">Loading...</div>
        <div class="game-meta" id="game-meta"></div>
    </div>
    <div class="topbar-hints" id="topbar-hints">Click game to capture keyboard</div>
    <button class="fullscreen-btn" onclick="goFullscreen()" title="True fullscreen (F11)">⛶ Fullscreen</button>
</div>

<!-- Player -->
<div class="player-wrap" id="player-wrap">
    <div class="emu-status" id="emu-status">
        <div class="spinner"></div>
        <div class="emu-status-title" id="emu-status-title">Loading emulator...</div>
        <div class="emu-status-sub" id="emu-status-sub">First launch downloads emulator files — may take a few seconds</div>
    </div>
    <div id="dos-player"></div>
</div>

<script>
'use strict';

const GAME_SERVER = 'https://games.jam-bot.com';
const EMULATOR_BASE = GAME_SERVER + '/emulators/jsdos';

// Parse URL params
const params = new URLSearchParams(window.location.search);
const GAME = {
    title:  params.get('title')  || 'Unknown Game',
    file:   params.get('file')   || '',
    system: params.get('system') || 'dos',
    cover:  params.get('cover')  || '',
    genre:  params.get('genre')  || '',
    year:   params.get('year')   || '',
};

// Set page title and UI
document.title = GAME.title + ' — Game Player';
document.getElementById('game-title').textContent = GAME.title;
const metaParts = [GAME.system?.toUpperCase(), GAME.genre, GAME.year].filter(Boolean);
document.getElementById('game-meta').textContent = metaParts.join(' · ');

function setStatus(icon, title, sub) {
    document.getElementById('emu-status').style.display = 'flex';
    document.getElementById('dos-player').style.display = 'none';
    const s = document.getElementById('emu-status');
    s.innerHTML = (icon
        ? `<div class="emu-status-icon">${icon}</div>`
        : '<div class="spinner"></div>') +
        `<div class="${icon === '⚠️' ? 'emu-error-title' : 'emu-status-title'}">${esc(title)}</div>` +
        (sub ? `<div class="emu-status-sub">${esc(sub)}</div>` : '');
}

function goFullscreen() {
    const wrap = document.getElementById('player-wrap');
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    else if (wrap.mozRequestFullScreen) wrap.mozRequestFullScreen();
}

function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Boot ── */
function boot() {
    if (!GAME.file) {
        setStatus('⚠️', 'No game file specified', 'Open a game from the Game Library page.');
        return;
    }

    if (GAME.system === 'dos') {
        loadJsDos();
    } else {
        setStatus('⚠️', GAME.system.toUpperCase() + ' emulator coming soon', 'DOS games are currently supported.');
    }
}

/* ── js-dos loader ── */
let jsdosReady = false;

function loadJsDos() {
    setStatus(null, 'Loading emulator...', 'First launch downloads emulator files — may take a few seconds');

    // CSS
    if (!document.querySelector('#jsdos-css')) {
        const link = document.createElement('link');
        link.id = 'jsdos-css';
        link.rel = 'stylesheet';
        link.href = EMULATOR_BASE + '/js-dos.css';
        document.head.appendChild(link);
    }

    // JS (served locally — avoids external CDN/CSP issues)
    const s = document.createElement('script');
    s.src = EMULATOR_BASE + '/js-dos.js';
    s.onload = () => {
        jsdosReady = true;
        startJsDos();
    };
    s.onerror = () => {
        setStatus('⚠️', 'Failed to load js-dos emulator',
            'Could not reach ' + GAME_SERVER + '. Check that the game server is running.');
    };
    document.head.appendChild(s);
}

function startJsDos() {
    const gameUrl = GAME_SERVER + GAME.file;
    const playerEl = document.getElementById('dos-player');

    document.getElementById('emu-status').style.display = 'none';
    playerEl.style.display = 'block';
    playerEl.innerHTML = '';

    try {
        Dos(playerEl, { url: gameUrl, kiosk: true, autoStart: true, mouseCapture: true, noCloud: true, backendLocked: true });
        document.getElementById('topbar-hints').textContent = 'F11 = fullscreen  ·  Click game to focus';
    } catch (e) {
        playerEl.style.display = 'none';
        setStatus('⚠️', 'Emulator error: ' + e.message, '');
    }
}

// Start
boot();
</script>
</body>
</html>
