<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Library</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#0d0f17;--surface:#141620;--surface-2:#1a1d2e;--surface-hover:#1f2235;
  --border:#252836;--border-light:#2f3245;
  --brand:#3b82f6;--brand-light:#60a5fa;--brand-dim:rgba(59,130,246,0.12);--brand-border:rgba(59,130,246,0.30);
  --text:#f3f4f8;--text-secondary:#9498ab;--text-muted:#5f6380;
  --radius:14px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;padding:20px;
}
.header{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;
}
.header h1{font-size:22px;font-weight:800;flex-shrink:0}
.header .sub{color:var(--text-secondary);font-size:13px;flex-basis:100%;margin-top:-6px}
.search-row{
  display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;
}
#search{
  flex:1;min-width:220px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:14px;
  font-family:inherit;outline:none;
}
#search:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
.stat-pill{
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:8px 16px;font-size:12px;color:var(--text-secondary);white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.stat-pill b{color:var(--text)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34d399;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;
}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;cursor:pointer;transition:border-color .15s,transform .15s;
  display:flex;flex-direction:column;gap:8px;
}
.card:hover{border-color:var(--brand-border);transform:translateY(-2px)}
.card .thumb{
  width:100%;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;
  background:var(--surface-2);display:flex;align-items:center;justify-content:center;
}
.card .thumb img{width:100%;height:100%;object-fit:contain}
.card .name{font-size:12.5px;font-weight:600;line-height:1.3;word-break:break-word}
.card .tenant{
  font-size:10px;color:var(--brand-light);background:var(--brand-dim);
  border:1px solid var(--brand-border);border-radius:6px;padding:2px 7px;
  align-self:flex-start;
}
.empty{
  text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:14px;
}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;
  align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);
  padding:20px;max-width:340px;width:100%;
}
.modal .thumb{width:100%;aspect-ratio:1;border-radius:var(--radius-sm);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px}
.modal .thumb img{width:100%;height:100%;object-fit:contain}
.modal .name{font-size:15px;font-weight:700;margin-bottom:4px}
.modal .prompt{font-size:12.5px;color:var(--text-secondary);line-height:1.5;margin-bottom:14px}
.modal .url-row{
  display:flex;gap:8px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:12px;
}
.modal .url-row input{
  flex:1;background:none;border:none;color:var(--text-secondary);font-size:11px;
  font-family:monospace;outline:none;
}
.modal .url-row button{
  background:var(--brand);color:#fff;border:none;border-radius:6px;padding:5px 10px;
  font-size:11px;cursor:pointer;font-weight:600;flex-shrink:0;
}
.modal-close{
  width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:9px;cursor:pointer;font-size:13px;font-family:inherit;
}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
</style>
</head>
<body>
  <div class="header">
    <h1>Icon Library</h1>
    <span class="stat-pill"><span class="live-dot"></span>live across all clients</span>
    <div class="sub">Every icon generated by any client, searchable — reused automatically before generating a new one.</div>
  </div>
  <div class="search-row">
    <input id="search" type="text" placeholder="Search icons by name or description…" oninput="onSearchInput()">
    <div class="stat-pill" id="count-pill"><b id="count">0</b>&nbsp;icons</div>
  </div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">No icons match that search.</div>

  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-body"></div>
  </div>

<script>
let allIcons = [];
let searchTimer = null;

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadIcons(query) {
  try {
    const url = '/api/icons/global-library?limit=200' + (query ? '&q=' + encodeURIComponent(query) : '');
    const resp = await fetch(url);
    if (!resp.ok) return;
    const data = await resp.json();
    allIcons = data.icons || [];
    render();
  } catch (e) { console.warn('[icon-library] load failed', e); }
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = allIcons.length;
  if (!allIcons.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = allIcons.map((icon, i) => `
    <div class="card" onclick="openModal(${i})">
      <div class="thumb"><img src="${icon.url}" loading="lazy" alt="${esc(icon.name)}"></div>
      <div class="name">${esc(icon.name.replace(/-icon$/, '').replace(/-/g, ' '))}</div>
      <div class="tenant">${esc(icon.tenant)}</div>
    </div>
  `).join('');
}

function onSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('search').value.trim();
  searchTimer = setTimeout(() => loadIcons(q), 300);
}

function openModal(i) {
  const icon = allIcons[i];
  if (!icon) return;
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="thumb"><img src="${icon.url}" alt="${esc(icon.name)}"></div>
    <div class="name">${esc(icon.name)}</div>
    <div class="prompt">${esc(icon.prompt || 'No prompt recorded.')} <span class="tenant" style="margin-left:6px">${esc(icon.tenant)}</span></div>
    <div class="url-row">
      <input readonly value="${esc(icon.url)}" onclick="this.select()">
      <button onclick="copyUrl('${icon.url.replace(/'/g,"\\'")}')">Copy</button>
    </div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function copyUrl(url) {
  const full = window.location.origin + url;
  navigator.clipboard?.writeText(full).catch(() => {});
}

// Live: re-poll every 30s (matches the desktop's manifest poll cadence) so a
// newly-generated icon from ANY client shows up here without a manual reload.
loadIcons('');
setInterval(() => {
  if (!document.getElementById('search').value.trim()) loadIcons('');
}, 30000);
</script>
</body>
</html>
