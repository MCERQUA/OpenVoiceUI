<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
            border-bottom: 1px solid #1e3a5f;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .logo-icon { font-size: 24px; }
        .logo-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #06b6d4;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .header-stats { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .stat-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #94a3b8; white-space: nowrap; }
        .stat-num { color: #3b82f6; font-weight: 700; font-size: 15px; }
        .stat-pending { color: #f59e0b; font-weight: 700; font-size: 14px; }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #10b981;
            animation: livepulse 2s infinite;
        }
        @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Controls ── */
        .controls {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 360px; }
        .search-icon {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            color: #6b7280; font-size: 14px; pointer-events: none;
        }
        .search-input {
            width: 100%;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 7px 12px 7px 32px;
            color: #e2e8f0;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: #3b82f6; }
        .search-input::placeholder { color: #6b7280; }
        .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .filter-btn {
            padding: 5px 11px;
            border-radius: 6px;
            border: 1px solid #374151;
            background: transparent;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #3b82f6; color: #60a5fa; }
        .filter-btn.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
        .sort-select {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 5px 10px;
            color: #9ca3af;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .controls-right { margin-left: auto; }

        /* ── Grid ── */
        .grid-container { padding: 16px 20px 52px; }
        .results-label {
            font-size: 11px;
            color: #6b7280;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 12px;
        }

        /* ── Game Card ── */
        .game-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .game-card:hover {
            border-color: #3b82f6;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(59,130,246,0.18);
        }
        .cover-wrap { position: relative; }
        .game-cover {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            object-position: center top;
            background: #0f172a;
            display: block;
        }
        .cover-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .placeholder-icon { font-size: 30px; }
        .placeholder-sys {
            font-size: 9px; letter-spacing: 2px;
            color: #374151; text-transform: uppercase;
        }
        .play-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .game-card:hover .play-overlay { background: rgba(0,0,0,0.45); }
        .play-btn-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(59,130,246,0.9);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0.75);
            transition: all 0.2s;
        }
        .game-card:hover .play-btn-circle { opacity: 1; transform: scale(1); }
        .play-triangle {
            width: 0; height: 0;
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            border-left: 15px solid white;
            margin-left: 3px;
        }
        .new-badge {
            position: absolute; top: 7px; left: 7px;
            background: #065f46; color: #6ee7b7;
            font-size: 9px; font-weight: 700; letter-spacing: 1px;
            padding: 2px 6px; border-radius: 4px;
            text-transform: uppercase;
        }
        .game-info { padding: 9px 11px; }
        .game-title {
            font-size: 13px; font-weight: 600; color: #e2e8f0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 6px;
        }
        .game-tags { display: flex; gap: 4px; flex-wrap: wrap; }
        .tag {
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
            font-weight: 500; line-height: 1.4;
        }
        .tag-sys { background: #1e3a5f; color: #60a5fa; }
        .tag-genre { background: #1a2e22; color: #34d399; }
        .tag-year { background: #1f1a2e; color: #a78bfa; }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #1f2937 25%, #2d3748 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skel-cover { width: 100%; aspect-ratio: 4/3; }
        .skel-title { height: 13px; width: 80%; margin-bottom: 8px; }
        .skel-tags { display: flex; gap: 4px; }
        .skel-tag { height: 16px; width: 38px; border-radius: 4px; }

        /* ── Empty / Error ── */
        .empty-state, .error-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-icon, .error-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-title, .error-title { font-size: 16px; color: #9ca3af; margin-bottom: 6px; }
        .error-sub { font-size: 13px; margin-top: 6px; }
        .retry-btn {
            margin-top: 14px;
            padding: 8px 20px;
            background: #1d4ed8;
            border: none; border-radius: 6px;
            color: white; font-size: 13px;
            cursor: pointer;
        }

        /* ── Coming Next ── */
        .coming-next {
            padding: 0 20px 4px;
            border-bottom: 1px solid #1f2937;
        }
        .coming-next-hdr {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: #4b5563;
            margin-bottom: 10px; padding-top: 12px;
        }
        .coming-next-hdr-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #f59e0b;
            animation: livepulse 1.5s infinite;
        }
        .coming-row {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: none;
        }
        .coming-row::-webkit-scrollbar { display: none; }
        .coming-card {
            flex-shrink: 0; width: 90px;
            background: #0f172a; border: 1px solid #1e2d40;
            border-radius: 8px; overflow: hidden;
            opacity: 0.75; position: relative;
        }
        .coming-card.active { border-color: #f59e0b; opacity: 1; }
        .coming-cover {
            width: 100%; aspect-ratio: 3/4;
            background: linear-gradient(135deg, #111827 0%, #1e293b 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; position: relative; overflow: hidden;
        }
        .coming-card.active .coming-cover::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(245,158,11,0.15) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }
        .coming-info { padding: 5px 6px 6px; }
        .coming-title {
            font-size: 10px; font-weight: 600; color: #94a3b8;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .coming-badge {
            font-size: 9px; padding: 1px 5px; border-radius: 3px;
            font-weight: 700; letter-spacing: 0.5px;
            display: inline-block;
        }
        .coming-badge-dl { background: #1a2d1a; color: #4ade80; }
        .coming-badge-soon { background: #1c1c2e; color: #6366f1; }

        /* ── Status Bar ── */
        .status-bar {
            position: fixed; bottom: 0;
            left: var(--canvas-safe-left,52px); right: var(--canvas-safe-right,52px);
            background: #0f172a;
            border-top: 1px solid #1f2937;
            padding: 7px 20px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; color: #6b7280;
            z-index: 100;
        }
        .status-left { display: flex; align-items: center; gap: 10px; }
        .status-dot-ok { color: #10b981; }
        .status-dot-err { color: #ef4444; }
        .downloading-badge {
            background: #1a2e1e; color: #34d399;
            padding: 2px 8px; border-radius: 4px; font-size: 10px;
            animation: livepulse 1.5s infinite;
        }

        /* ── Emulator Modal ── */
        .modal-overlay {
            display: none; position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #0a0a0a;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            width: min(98%, 920px);
            max-height: 92vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .modal-hdr {
            background: #111827;
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1f2937;
            flex-shrink: 0;
        }
        .modal-hdr-info {}
        .modal-game-name { font-size: 16px; font-weight: 700; color: #e2e8f0; }
        .modal-game-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .modal-close {
            background: #1f2937; border: none; color: #9ca3af;
            width: 32px; height: 32px; border-radius: 6px;
            font-size: 18px; cursor: pointer; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .modal-close:hover { background: #374151; color: #e2e8f0; }
        .modal-newtab {
            background: #1e3a5f; border: 1px solid #2d5a8e; color: #60a5fa;
            padding: 6px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            white-space: nowrap; flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }
        .modal-newtab:hover { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
        .modal-hdr-actions { display: flex; align-items: center; gap: 8px; }
        .modal-body {
            flex: 1; background: #000;
            min-height: 420px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        #dos-player { width: 100%; height: min(520px, 65vh); display: none; }
        .emu-status { text-align: center; color: #6b7280; padding: 20px; }
        .emu-status-icon { font-size: 40px; margin-bottom: 12px; }
        .emu-status-title { font-size: 15px; color: #9ca3af; margin-bottom: 6px; }
        .emu-status-sub { font-size: 12px; }
        .emu-error-title { font-size: 15px; color: #f87171; margin-bottom: 6px; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #1f2937;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-tips {
            background: #0f172a; border-top: 1px solid #1f2937;
            padding: 8px 16px;
            font-size: 11px; color: #4b5563;
            flex-shrink: 0;
        }

        /* ── Toast ── */
        #toast {
            position: fixed; top: 16px; right: 16px;
            background: #065f46; color: #6ee7b7;
            padding: 10px 16px; border-radius: 8px;
            font-size: 13px; z-index: 9999;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .header { padding: 8px 12px; gap: 4px 8px; }
            .logo-text { font-size: 15px; letter-spacing: 2px; }
            .logo-icon { font-size: 20px; }
            .header-stats { gap: 8px; }
            .stat-item { font-size: 11px; }

            /* Controls: stack vertically */
            .controls { padding: 10px 12px; gap: 8px; }
            .search-wrap { max-width: 100%; min-width: 0; flex: unset; width: 100%; }
            /* System filter: horizontal scroll instead of wrapping */
            .filter-group {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 2px;
                max-width: 100%;
            }
            .filter-btn { white-space: nowrap; padding: 7px 12px; font-size: 12px; min-height: 36px; }
            .controls-right { margin-left: 0; width: 100%; }
            .sort-select { width: 100%; padding: 8px 10px; font-size: 14px; }

            /* Game grid: 2 columns on mobile */
            .game-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .grid-container { padding: 12px 12px 52px; }

            /* Game card touch targets */
            .game-info { padding: 8px 10px; }
            .game-title { font-size: 12px; }

            /* Emulator modal: full screen on mobile */
            .modal-overlay { align-items: flex-end; }
            .modal-box {
                width: 100vw !important;
                max-width: 100vw !important;
                max-height: 100vh !important;
                border-radius: 14px 14px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
            }
            #dos-player { height: calc(100vh - 120px) !important; }

            /* Status bar: single line */
            .status-bar { padding: 6px 12px; font-size: 11px; }

            /* Bigger search input to prevent iOS zoom */
            .search-input { font-size: 16px; }
        }

        @media (max-width: 380px) {
            .game-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-item:not(:first-child):not(#pending-stat) { display: none; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        <span class="logo-icon">🕹️</span>
        <span class="logo-text">Game Library</span>
    </div>
    <div class="header-stats">
        <div class="stat-item">
            <div class="live-dot"></div>
            <span>Live</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="stat-total">—</span>&nbsp;games
        </div>
        <div class="stat-item">
            <span class="stat-num" id="stat-systems">—</span>&nbsp;systems
        </div>
        <div class="stat-item" id="pending-stat" style="display:none">
            <span class="stat-pending" id="stat-pending">0</span>&nbsp;downloading
        </div>
    </div>
</div>

<!-- Controls -->
<div class="controls">
    <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="search-input"
               placeholder="Search games..." oninput="applyFilters()">
    </div>
    <div class="filter-group" id="system-filters">
        <button class="filter-btn active" data-sys="" onclick="setSysFilter(this,'')">All</button>
    </div>
    <div class="controls-right">
        <select class="sort-select" id="sort-sel" onchange="applyFilters()">
            <option value="newest">Newest First</option>
            <option value="title">Title A–Z</option>
            <option value="year">Year ↓</option>
        </select>
    </div>
</div>

<!-- Coming Next -->
<div class="coming-next" id="coming-next" style="display:none">
    <div class="coming-next-hdr">
        <div class="coming-next-hdr-dot"></div>
        <span id="coming-hdr-text">Coming Next</span>
    </div>
    <div class="coming-row" id="coming-row"></div>
</div>

<!-- Grid -->
<div class="grid-container">
    <div class="results-label" id="results-label">Loading...</div>
    <div class="game-grid" id="game-grid" aria-label="Game library"></div>
</div>

<!-- Status bar -->
<div class="status-bar">
    <div class="status-left">
        <span id="status-indicator" class="status-dot-ok">●</span>
        <span id="status-text">Connecting...</span>
        <span id="dl-badge" class="downloading-badge" style="display:none">⬇ Downloading...</span>
    </div>
    <span id="last-updated">—</span>
</div>

<!-- Emulator Modal -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
    <div class="modal-box">
        <div class="modal-hdr">
            <div class="modal-hdr-info">
                <div class="modal-game-name" id="modal-title">—</div>
                <div class="modal-game-meta" id="modal-meta">—</div>
            </div>
            <div class="modal-hdr-actions">
                <button class="modal-newtab" id="modal-newtab-btn" onclick="openInNewTab()" title="Open in new tab — true full screen, no overlay">⛶ Full Screen</button>
                <button class="modal-close" onclick="closeGame()" title="Close (Esc)">✕</button>
            </div>
        </div>
        <div class="modal-body" id="modal-body">
            <div class="emu-status" id="emu-loading">
                <div class="spinner"></div>
                <div class="emu-status-title">Loading emulator...</div>
                <div class="emu-status-sub">First launch may take a few seconds</div>
            </div>
            <div id="dos-player"></div>
        </div>
        <div class="modal-tips">
            F11 = fullscreen &nbsp;|&nbsp; Esc = close &nbsp;|&nbsp; Click game to focus controls
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

const GAME_SERVER = 'https://games.jam-bot.com';
const API_BASE = GAME_SERVER;
const REFRESH_MS = 30000;

const SYS_ICONS = { dos:'💾', nes:'🎮', snes:'🎯', gba:'📱', gb:'🟢', gbc:'🟡', n64:'🕹️', psx:'💿', segamd:'🌀', segams:'🎪', segagg:'📟' };
function sysIcon(s) { return SYS_ICONS[s] || '🕹️'; }

let allGames = [];        // raw from server
let renderedIds = new Set(); // IDs already in the DOM (for smart diff)
let currentSys = '';
let refreshTimer = null;
let toastTimer = null;

/* ── Fetch & Refresh ── */
async function fetchGames() {
    try {
        const [gRes, sRes] = await Promise.all([
            fetch(API_BASE + '/api/games'),
            fetch(API_BASE + '/api/stats'),
        ]);
        if (!gRes.ok) throw new Error('HTTP ' + gRes.status);
        const games = await gRes.json();
        const stats = sRes.ok ? await sRes.json() : {};

        const prevCount = allGames.length;
        allGames = games;

        updateStats(stats);
        updateSysFilters(games);
        applyFilters();

        const now = new Date().toLocaleTimeString();
        setStatus('ok', `${games.length} game${games.length !== 1 ? 's' : ''} available`
            + (stats.pending > 0 ? ` · ${stats.pending} queued` : ''));
        setLastUpdated('Updated ' + now);

        const isDownloading = stats.pending > 0 || stats.downloading > 0;
        document.getElementById('dl-badge').style.display = isDownloading ? '' : 'none';

        // Toast on new games
        if (prevCount > 0 && games.length > prevCount) {
            const n = games.length - prevCount;
            showToast(`+${n} new game${n !== 1 ? 's' : ''} added!`);
        }

        // Refresh coming-next panel
        fetchNext();

    } catch (e) {
        setStatus('err', 'Game server unreachable — retrying');
        setLastUpdated('Error');
        if (allGames.length === 0) showNetError();
    }
}

async function fetchNext() {
    try {
        const res = await fetch(API_BASE + '/api/next?limit=8');
        if (!res.ok) return;
        const coming = await res.json();
        renderComingNext(coming);
    } catch (e) { /* silent */ }
}

function renderComingNext(coming) {
    const wrap = document.getElementById('coming-next');
    const row = document.getElementById('coming-row');
    const hdr = document.getElementById('coming-hdr-text');
    if (!coming || coming.length === 0) { wrap.style.display = 'none'; return; }

    const dlGame = coming.find(g => g.status === 'downloading');
    hdr.textContent = dlGame
        ? `Downloading: ${dlGame.title}`
        : `Coming Next — ${coming.length} games queued`;

    row.innerHTML = coming.map(g => {
        const isActive = g.status === 'downloading';
        const badge = isActive
            ? '<span class="coming-badge coming-badge-dl">Downloading</span>'
            : '<span class="coming-badge coming-badge-soon">Soon</span>';
        return `
        <div class="coming-card${isActive ? ' active' : ''}">
            <div class="coming-cover">
                ${g.cover
                    ? `<img src="${GAME_SERVER + g.cover}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
                    : '🎮'}
            </div>
            <div class="coming-info">
                <div class="coming-title" title="${esc(g.title)}">${esc(g.title)}</div>
                ${badge}
            </div>
        </div>`;
    }).join('');

    wrap.style.display = '';
}

function setStatus(state, msg) {
    const ind = document.getElementById('status-indicator');
    ind.textContent = '●';
    ind.className = state === 'ok' ? 'status-dot-ok' : 'status-dot-err';
    document.getElementById('status-text').textContent = msg;
}
function setLastUpdated(t) { document.getElementById('last-updated').textContent = t; }

/* ── Stats bar ── */
function updateStats(stats) {
    document.getElementById('stat-total').textContent = stats.downloaded ?? 0;
    document.getElementById('stat-systems').textContent = Object.keys(stats.bySystem || {}).length;
    const p = stats.pending ?? 0;
    document.getElementById('stat-pending').textContent = p;
    document.getElementById('pending-stat').style.display = p > 0 ? '' : 'none';
}

/* ── System filter buttons ── */
function updateSysFilters(games) {
    const systems = [...new Set(games.map(g => g.system))].sort();
    const container = document.getElementById('system-filters');
    const allBtn = container.querySelector('[data-sys=""]');
    container.innerHTML = '';
    container.appendChild(allBtn);
    for (const sys of systems) {
        const existing = container.querySelector(`[data-sys="${sys}"]`);
        if (existing) continue;
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (currentSys === sys ? ' active' : '');
        btn.dataset.sys = sys;
        btn.textContent = sys.toUpperCase();
        btn.onclick = () => setSysFilter(btn, sys);
        container.appendChild(btn);
    }
}

function setSysFilter(btn, sys) {
    currentSys = sys;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

/* ── Filter + Sort + Render ── */
function applyFilters() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const sort = document.getElementById('sort-sel').value;

    let games = allGames.filter(g => {
        if (currentSys && g.system !== currentSys) return false;
        if (q && !g.title.toLowerCase().includes(q) && !(g.description || '').toLowerCase().includes(q)) return false;
        return true;
    });

    if (sort === 'title') {
        games.sort((a, b) => a.title.localeCompare(b.title));
    } else if (sort === 'year') {
        games.sort((a, b) => (b.year || 0) - (a.year || 0));
    }
    // newest: catalog order (auto-discovered games append to end)

    renderGames(games, sort);
}

function renderGames(games, sort) {
    const grid = document.getElementById('game-grid');
    const label = document.getElementById('results-label');

    if (allGames.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">No games downloaded yet</div><div>Games are being downloaded in the background — check back soon!</div></div>';
        label.textContent = '0 games';
        return;
    }

    if (games.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No matching games</div><div>Try a different search or filter</div></div>';
        label.textContent = 'No results';
        return;
    }

    label.textContent = `${games.length} game${games.length !== 1 ? 's' : ''}` +
        (currentSys ? ` · ${currentSys.toUpperCase()}` : '');

    // Smart diff: only rebuild if set of IDs changed or order changed
    const newIds = games.map(g => g.id);
    const oldIds = [...grid.querySelectorAll('.game-card')].map(c => c.dataset.id);
    const sameOrder = newIds.join(',') === oldIds.join(',');
    if (sameOrder && games.length === oldIds.length) return; // nothing changed

    // Partial diff: if we're just adding to the end (newest sort, same prefix)
    if (sort === 'newest' && oldIds.length > 0 && newIds.slice(0, oldIds.length).join(',') === oldIds.join(',')) {
        const newOnes = games.slice(oldIds.length);
        for (const g of newOnes) {
            grid.appendChild(makeCard(g));
            renderedIds.add(g.id);
        }
        return;
    }

    // Full re-render
    grid.innerHTML = '';
    renderedIds.clear();
    for (const g of games) {
        grid.appendChild(makeCard(g));
        renderedIds.add(g.id);
    }
}

/* ── Game store for click handler ── */
const gameStore = {};

function makeCard(g) {
    gameStore[g.id] = g;

    const card = document.createElement('div');
    card.className = 'game-card';
    card.dataset.id = g.id;
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `Play ${g.title}`);
    card.onclick = () => openGame(g.id);
    card.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') openGame(g.id); };

    // Cover + play overlay
    const coverWrap = document.createElement('div');
    coverWrap.className = 'cover-wrap';

    if (g.cover) {
        const img = document.createElement('img');
        img.className = 'game-cover';
        img.src = GAME_SERVER + g.cover;
        img.alt = g.title;
        img.loading = 'lazy';
        img.onerror = function() {
            this.style.display = 'none';
            this.nextSibling && (this.nextSibling.style.display = 'flex');
        };
        coverWrap.appendChild(img);
        const ph = makePlaceholder(g.system);
        ph.style.display = 'none';
        coverWrap.appendChild(ph);
    } else {
        coverWrap.appendChild(makePlaceholder(g.system));
    }

    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    overlay.innerHTML = '<div class="play-btn-circle"><div class="play-triangle"></div></div>';
    coverWrap.appendChild(overlay);

    card.appendChild(coverWrap);

    // Info
    const info = document.createElement('div');
    info.className = 'game-info';

    const title = document.createElement('div');
    title.className = 'game-title';
    title.title = g.title;
    title.textContent = g.title;

    const tags = document.createElement('div');
    tags.className = 'game-tags';
    tags.innerHTML =
        `<span class="tag tag-sys">${esc(g.system.toUpperCase())}</span>` +
        (g.genre ? `<span class="tag tag-genre">${esc(g.genre)}</span>` : '') +
        (g.year ? `<span class="tag tag-year">${g.year}</span>` : '');

    info.appendChild(title);
    info.appendChild(tags);
    card.appendChild(info);

    return card;
}

function makePlaceholder(sys) {
    const ph = document.createElement('div');
    ph.className = 'cover-placeholder';
    ph.innerHTML = `<div class="placeholder-icon">${sysIcon(sys)}</div><div class="placeholder-sys">${esc(sys)}</div>`;
    return ph;
}

function showNetError() {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = `<div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Cannot reach game server</div>
        <div class="emu-status-sub">Make sure <code>games.jam-bot.com</code> is accessible</div>
        <button class="retry-btn" onclick="fetchGames()">Retry</button>
    </div>`;
    document.getElementById('results-label').textContent = 'Error';
}

function showSkeletons() {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = Array(8).fill(0).map(() => `
        <div class="game-card" style="cursor:default;pointer-events:none">
            <div class="skel-cover skeleton"></div>
            <div class="game-info">
                <div class="skel-title skeleton"></div>
                <div class="skel-tags">
                    <div class="skel-tag skeleton"></div>
                    <div class="skel-tag skeleton" style="width:50px"></div>
                </div>
            </div>
        </div>`).join('');
}

/* ── Emulator ── */

function openGame(id) {
    window.open(GAME_SERVER + '/play/' + id, '_blank');
}

/* ── Utilities ── */
function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

/* ── Init ── */
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('modal').classList.contains('open')) {
        closeGame();
    }
});

document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeGame();
});

showSkeletons();
fetchGames();
fetchNext();
refreshTimer = setInterval(fetchGames, REFRESH_MS);
</script>
